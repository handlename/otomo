services:
  jaeger:
    image: jaegertracing/all-in-one:1.60
    container_name: otomo-jaeger
    ports:
      # Jaeger Web UI
      - "16686:16686"
      # OpenTelemetry Protocol HTTP
      - "4318:4318"
      # OpenTelemetry Protocol gRPC
      - "4317:4317"
    environment:
      - COLLECTOR_OTLP_ENABLED=true
    restart: unless-stopped
