[tools]
"aqua:fujiwara/lambroll" = "1"

[env]
SERVICE_NAME = "otomo"
AWS_REGION = "us-east-1"
ROLE_ARN = "{{ get_env(name='ROLE_ARN', default=exec(command='cat \"${TFSTATE_PATH:-../terraform/terraform.tfstate}\" 2>/dev/null | jq -r \".resources[] | select(.type == \\\"aws_iam_role\\\") | select(.name == \\\"lambda\\\") | .instances[0].attributes.arn\" 2>/dev/null || true')) }}"

[vars]
ssmwrap_version = "2.2.2"
lambroll_cmd = "lambroll"
lambroll_args = "--src build --function-url function_url.jsonnet"

[tasks.clean]
description = "Clean build artifacts"
run = "rm -rf build"

[tasks.ssmwrap]
description = "Download and extract ssmwrap"
sources = ["{{ config_root }}/.mise.toml"]
outputs = ["{{ config_root }}/tmp/ssmwrap_2.2.2/ssmwrap"]
run = """
SSMWRAP_VERSION="{{ vars.ssmwrap_version }}"
mkdir -p tmp/ssmwrap_${SSMWRAP_VERSION}
curl -sSfL "https://github.com/handlename/ssmwrap/releases/download/v${SSMWRAP_VERSION}/ssmwrap_${SSMWRAP_VERSION}_linux_arm64.tar.gz" | tar -C tmp/ssmwrap_${SSMWRAP_VERSION} -xzf - || { rm -rf tmp/ssmwrap_${SSMWRAP_VERSION}; exit 1; }
touch tmp/ssmwrap_${SSMWRAP_VERSION}/ssmwrap
"""

[tasks.compile]
description = "Compile Go application for Lambda"
depends = ["clean"]
env = { GOOS = "linux", GOARCH = "arm64" }
run = "go build -o build/app ../cmd/otomo/"

[tasks.build]
description = "Build lambda execution package"
depends = ["clean", "ssmwrap", "compile"]
run = """
mkdir -p build
SSMWRAP_VERSION="{{ vars.ssmwrap_version }}"
cp tmp/ssmwrap_${SSMWRAP_VERSION}/ssmwrap build/
cp ../config.toml build/
cp bootstrap build/
"""

[tasks.deploy]
description = "Deploy lambda function"
depends = ["build"]
run = "{{ vars.lambroll_cmd }} deploy {{ vars.lambroll_args }}"

[tasks.dryrun]
description = "Dry run deploy lambda function"
depends = ["build"]
run = "{{ vars.lambroll_cmd }} deploy {{ vars.lambroll_args }} --dry-run"

[tasks.diff]
description = "Diff lambda function configuration"
depends = ["build"]
run = "{{ vars.lambroll_cmd }} diff {{ vars.lambroll_args }}"

[tasks.destroy]
description = "Delete lambda function"
run = "{{ vars.lambroll_cmd }} delete"

[tasks.logs]
description = "Tail lambda function logs"
run = "{{ vars.lambroll_cmd }} logs --follow"
